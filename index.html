<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CCTV5</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: fill; }
  </style>
</head>
<body>
  <video id="video" autoplay></video>
  <script>
    const src = 'https://cctv5-proxy.zhuo-gemini.workers.dev/';
    const video = document.getElementById('video');
    let hls;

    function startStream() {
      if (!Hls.isSupported()) {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = src;
        }
        return;
      }

      if (hls) hls.destroy();

      hls = new Hls({
        maxBufferLength: 90,
        maxMaxBufferLength: 180,
        maxBufferSize: 150 * 1024 * 1024,
        maxBufferHole: 2,
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 5,
        liveBackBufferLength: 30,
        fragLoadingTimeOut: 20000,
        fragLoadingMaxRetry: 6,
        fragLoadingRetryDelay: 1000,
        manifestLoadingTimeOut: 10000,
        manifestLoadingMaxRetry: 6,
        levelLoadingTimeOut: 10000,
        lowLatencyMode: false,
        startPosition: -1,
        nudgeMaxRetry: 10,
      });

      hls.loadSource(src);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);

      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            setTimeout(startStream, 3000);
          }
        } else if (data.details === 'bufferStalledError') {
          // Jump to live edge on stall
          if (hls.liveSyncPosition) {
            video.currentTime = hls.liveSyncPosition;
          }
        }
      });

      // Auto-recover from stall: if no timeupdate for 5s, jump to live
      let lastUpdate = Date.now();
      video.addEventListener('timeupdate', () => { lastUpdate = Date.now(); });
      setInterval(() => {
        if (Date.now() - lastUpdate > 5000 && hls && hls.liveSyncPosition) {
          video.currentTime = hls.liveSyncPosition;
          tryPlay();
        }
      }, 3000);
    }

    function tryPlay() {
      const p = video.play();
      if (p) p.catch(() => {
        video.muted = true;
        video.play().then(() => setTimeout(() => { video.muted = false; }, 2000));
      });
    }

    startStream();
  </script>
</body>
</html>
