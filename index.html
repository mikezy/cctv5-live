<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CCTV5</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: fill; }
    #status {
      position: fixed; top: 8px; right: 8px; width: 10px; height: 10px;
      border-radius: 50%; background: #444; z-index: 9999;
      transition: background 0.3s;
    }
    #status.live { background: #0f0; }
    #status.stall { background: #f00; animation: pulse 1s infinite; }
    #status.reconnecting { background: #fa0; animation: pulse 0.5s infinite; }
    @keyframes pulse { 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="status"></div>
  <script>
    const src = 'https://cctv5-proxy.zhuo-gemini.workers.dev/';
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    let hls;
    let lastTime = -1;
    let stallCount = 0;
    let tokenRefreshTimer = null;
    let isReconnecting = false;

    function setStatus(state) {
      status.className = state;
    }

    function startStream() {
      // Prevent stall detector from re-triggering during reconnection
      isReconnecting = true;
      stallCount = 0;
      lastTime = -1;

      if (!Hls.isSupported()) {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = src;
        }
        return;
      }

      setStatus('reconnecting');

      if (hls) hls.destroy();

      hls = new Hls({
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        maxBufferSize: 100 * 1024 * 1024,
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 5,
        fragLoadingTimeOut: 20000,
        fragLoadingMaxRetry: 6,
        manifestLoadingTimeOut: 10000,
        lowLatencyMode: false,
      });

      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);

      // --- Error handling ---
      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          setStatus('reconnecting');
          isReconnecting = true;
          stallCount = 0;
          lastTime = -1;
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            setTimeout(startStream, 3000);
          }
        }
      });

      // --- Token refresh: every 4 minutes, force reload playlist ---
      clearInterval(tokenRefreshTimer);
      tokenRefreshTimer = setInterval(() => {
        if (hls && !isReconnecting) {
          hls.stopLoad();
          hls.startLoad(-1);
        }
      }, 4 * 60 * 1000);
    }

    function tryPlay() {
      video.muted = true;
      video.play().catch(() => {});
    }

    // --- Unmute and unlock stall detector when video actually plays ---
    video.addEventListener('playing', () => {
      video.muted = false;
      setStatus('live');
      // Unlock stall detector — give it a fresh baseline
      isReconnecting = false;
      stallCount = 0;
      lastTime = video.currentTime;
    });

    // --- Stall detection ---
    // Every 5 seconds: if currentTime hasn't moved in 15s, restart.
    // Completely disabled while reconnecting (isReconnecting = true).
    setInterval(() => {
      // Don't check while reconnecting or not yet playing
      if (isReconnecting) return;
      if (video.paused || video.readyState < 2) return;

      const now = video.currentTime;
      if (lastTime >= 0 && now === lastTime) {
        stallCount++;
        if (stallCount >= 3) {
          // 15 seconds frozen → full restart
          setStatus('stall');
          startStream();
        } else if (stallCount >= 2) {
          setStatus('stall');
        }
      } else {
        stallCount = 0;
        setStatus('live');
      }
      lastTime = now;
    }, 5000);

    // --- Hide status dot after 30s of smooth playback ---
    let hideTimer = null;
    const observer = new MutationObserver(() => {
      if (status.className === 'live') {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => { status.style.opacity = '0'; }, 30000);
      } else {
        clearTimeout(hideTimer);
        status.style.opacity = '1';
      }
    });
    observer.observe(status, { attributes: true, attributeFilter: ['class'] });

    startStream();
  </script>
</body>
</html>
