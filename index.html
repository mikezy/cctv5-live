<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CCTV5</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: fill; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <script>
    const src = 'https://cctv5-proxy.zhuo-gemini.workers.dev/';
    const video = document.getElementById('video');
    let hls;
    let lastPlayTime = Date.now();
    let audioUnlocked = false;

    // Route audio through Web Audio API as fallback for signage browsers
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const source = ctx.createMediaElementSource(video);
        source.connect(ctx.destination);
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        audioUnlocked = true;
      } catch (e) {}
    }

    function startStream() {
      if (!Hls.isSupported()) {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = src;
        }
        return;
      }

      if (hls) hls.destroy();

      hls = new Hls({
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        maxBufferSize: 100 * 1024 * 1024,
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 5,
        fragLoadingTimeOut: 20000,
        fragLoadingMaxRetry: 6,
        manifestLoadingTimeOut: 10000,
        lowLatencyMode: false,
      });

      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);

      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            setTimeout(startStream, 3000);
          }
        }
      });
    }

    function tryPlay() {
      video.muted = true;
      video.play().then(() => {
        unlockAudio();
      }).catch(() => {});
    }

    // Unmute once playing
    video.addEventListener('playing', function unmute() {
      video.removeEventListener('playing', unmute);
      video.muted = false;
    });

    // Periodically retry unmute if still muted (signage browsers may relax policy)
    let unmuteAttempts = 0;
    const unmuteInterval = setInterval(() => {
      if (!video.muted || unmuteAttempts > 20) {
        clearInterval(unmuteInterval);
        return;
      }
      video.muted = false;
      setTimeout(() => {
        if (video.paused) {
          video.muted = true;
          video.play().catch(() => {});
        }
      }, 500);
      unmuteAttempts++;
    }, 5000);

    // Track last successful playback
    video.addEventListener('timeupdate', () => {
      lastPlayTime = Date.now();
    });

    // If nothing plays for 60s, full page reload
    setInterval(() => {
      if (Date.now() - lastPlayTime > 60000) {
        window.location.reload();
      }
    }, 10000);

    startStream();
  </script>
</body>
</html>
