<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CCTV5</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: fill; }
  </style>
</head>
<body>
  <video id="video" autoplay muted playsinline></video>
  <script>
    const src = 'https://cctv5-proxy.zhuo-gemini.workers.dev/';
    const video = document.getElementById('video');
    let hls;

    function startStream() {
      if (!Hls.isSupported()) {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = src;
        }
        return;
      }

      if (hls) hls.destroy();

      hls = new Hls({
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        maxBufferSize: 100 * 1024 * 1024,
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 5,
        fragLoadingTimeOut: 20000,
        fragLoadingMaxRetry: 6,
        manifestLoadingTimeOut: 10000,
        lowLatencyMode: false,
      });

      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, tryPlay);

      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
          } else {
            setTimeout(startStream, 3000);
          }
        }
      });
    }

    function tryPlay() {
      video.muted = true;
      video.play().then(() => {
        // Try unmuting after 2s (works if user has interacted before)
        setTimeout(() => { video.muted = false; }, 2000);
      }).catch(() => {});
    }

    startStream();

    // Click anywhere to unmute
    document.addEventListener('click', () => { video.muted = false; }, { once: true });
  </script>
</body>
</html>
